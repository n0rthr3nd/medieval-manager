<div class="container">
  <!-- Compact Header -->
  <header class="header">
    <div class="header-logo">
      <img src="/assets/images/mma-logo-2.png" alt="MMA Logo" class="logo" />
      <h1>Medieval Manager Alchemist</h1>
    </div>

    <!-- User Badge and Logout (only when logged in) -->
    <div class="user-info" *ngIf="showNav">
      <span class="user-badge">👤 {{ currentUser }}</span>
      <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
    </div>
  </header>

  <!-- Navigation Tabs (only when logged in) -->
  <nav class="nav-tabs" *ngIf="showNav">
    <a
      routerLink="/orders"
      class="nav-tab"
      [class.active]="isActive('/orders')"
    >
      <span class="icon">📝</span>
      <span class="label">Pedidos</span>
    </a>
    <a
      routerLink="/summary"
      class="nav-tab"
      [class.active]="isActive('/summary')"
    >
      <span class="icon">📊</span>
      <span class="label">Resumen</span>
    </a>
    <a
      routerLink="/payments"
      class="nav-tab"
      [class.active]="isActive('/payments')"
    >
      <span class="icon">💰</span>
      <span class="label">Pagos</span>
    </a>
    <a
      routerLink="/estadisticas"
      class="nav-tab"
      [class.active]="isActive('/estadisticas')"
    >
      <span class="icon">📈</span>
      <span class="label">Estadísticas</span>
    </a>
    <a
      *ngIf="isAdmin"
      routerLink="/admin"
      class="nav-tab"
      [class.active]="isActive('/admin')"
    >
      <span class="icon">🧙‍♂️</span>
      <span class="label">Admin</span>
    </a>
    <a
      *ngIf="isAdmin"
      routerLink="/users"
      class="nav-tab"
      [class.active]="isActive('/users')"
    >
      <span class="icon">👥</span>
      <span class="label">Usuarios</span>
    </a>
  </nav>

  <!-- Router Outlet for Views -->
  <div class="content-wrapper">
    <router-outlet></router-outlet>
  </div>

  <footer class="footer">
    <p>Desarrollado con Angular 19</p>
  </footer>
</div>
